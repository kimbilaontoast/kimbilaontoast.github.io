# Kimbila on Toast Site Settings 

# logo: "/assets/images/android-chrome-88x88.png"
title: Kimbila on Toast
email: kimbila@gmx.com
description: >- # this means to ignore newlines until "baseurl:"
 Tales from a delirious, time travelling Buddhist. 
url: "https://kimbilaontoast.github.io"
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
# Outputting
permalink: /:categories/:title/
paginate: 5 
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# SEO related 
google_site_verification: dqGypmT-UdtT-U1iSHp0j5AzXT7snjWLkOfPExiG1W0
  # bing_site_verification   :   
  # yandex_site_verification :
  # baidu_site_verification  :

# Analytics 
analytics:
  provider: "google-gtag"
  google:
  tracking_id: "G-5NNTHPGLHY"
  anonymize_ip: true 

# Site Author 
author:
  name   : "Kimbila"
  avatar : "/assets/images/bio-photo-4-250x250-gradient.jpg"
  bio    : "Tales from a *delirious*, *time travelling Buddhist*."
  location: "Bodhinyana Monastery,  
Australia"
  email:  "kimbila@gmx.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:kimbila@gmx.com"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide 
      author_profile: true
      read_time: true
      comments: # true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# resolves 'GitHub Metadata: No GitHub API authentication could be found error'. 
github: [metadata]
